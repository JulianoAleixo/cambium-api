name: CI/CD da aplicação

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Building application"
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Installing dependencies
        run: pip install -e ".[dev]"
  
  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: echo "Running lint"
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Installing dependencies
        run: pip install -e ".[dev]"

      - name: Check formatting with black
        run: black --check .

      - name: Check import order with isort
        run: isort --check-only .

      - name: Check style with flake8
        run: flake8 .

  test:
    runs-on: ubuntu-latest
    needs: build 
    steps:
      - run: echo "Running tests"
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Installing dependencies
        run: pip install -e ".[dev]"

      - name: Running pytest
        run: python -m pytest

  health_check_local:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: echo "Testing Health Route Locally"
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Installing dependencies
        run: pip install -e ".[dev]"

      - name: Sobe o servidor e testa localmente
        run: |
          python run.py &
          sleep 5
          curl -f http://127.0.0.1:5000/health

  test_coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Installing dependencies
        run: pip install -e ".[dev]"

      - name: Running pytest with coverage
        run: pytest --cov=app/services --cov-report=html:htmlcov --cov-report=term-missing

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

  deployment_app: 
    needs: [build, lint, health_check_local, test, test_coverage]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    runs-on: ubuntu-latest
    
    steps:
      - run: echo "Deploying application"
      - uses: actions/checkout@v4

      - name: Criar .env
        run: |
          echo "FLASK_DEBUG=${{ secrets.FLASK_DEBUG }}" >> .env
          echo "FRANKFURTER_BASE_URL=${{ secrets.FRANKFURTER_BASE_URL }}" >> .env
          echo "REQUEST_TIMEOUT=${{ secrets.REQUEST_TIMEOUT }}" >> .env

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        run: railway up --service cambium-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  health_check_prod:
    runs-on: ubuntu-latest
    needs: deployment_app
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - run: echo "Verificando API no ar no Railway"
      - name: Testar URL de Produção
        run: |
          sleep 15
          curl -f https://cambium-api-production.up.railway.app/health

  notification:
    runs-on: ubuntu-latest
    needs: [deployment_app, health_check_prod]
    if: always() && needs.deployment_app.result != 'skipped'
    steps:
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          subject: >
            ${{ needs.deployment_app.result == 'success' && 'Deploy realizado' || 'Falha no deploy' }}
            - ${{ github.repository }}
          body: |
            Repositório: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Autor: ${{ github.actor }}
            Status do deploy: ${{ needs.deployment_app.result }}
            Health Check Produção: ${{ needs.health_check_prod.result }}

            URL do Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}