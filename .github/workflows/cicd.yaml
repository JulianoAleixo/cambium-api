name: CI/CD da aplicação

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Building application"
      #step 1: baixar o código do repositório para o runner
      - uses: actions/checkout@v3

      #step 2: configurando versão desejada do python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      #step 3: instalando dependências e criando cache de dependências para versões futuras
      - name: Installing dependencies
        run: |
          python -m pip install -r requirements.txt
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Running tests"
          
      #step 1: baixar o código do repositório para o runner
      - uses: actions/checkout@v3

      #step 2: configurando versão desejada do python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      #step 3: instalando dependências e criando cache de dependências para versões futuras
      - name: Installing dependencies
        run: |
          python -m pip install requirements.txt
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      #step 4: executar a suíte de testes
      - name: Running pytest
        run: |
          pytest

  test_coverage:
    runs-on: ubuntu-latest
    steps: 
      - run: echo "Running test coverage report"

  deploy: 
    runs-on: ubuntu-latesst
    steps:
      - run: echo "Deploying application"

  notification:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Notifying user on email"

